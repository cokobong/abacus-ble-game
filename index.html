<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주판 속산 보스전</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #101114;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .sub {
      color: #b7bcc7;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .card {
      background: #1a1c22;
      border: 1px solid #2e3440;
      border-radius: 18px;
      padding: 18px;
      margin-top: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.24);
    }

    .top-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    button {
      padding: 12px 18px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #connectBtn { background: #14c7d8; color: #071014; }
    #disconnectBtn { background: #59616d; color: white; }
    #startBtn { background: #ffbf1f; color: #231700; }
    #checkBtn { background: #55c26a; color: white; }

    #status {
      min-height: 28px;
      margin-top: 12px;
      color: #8cd4ff;
      line-height: 1.5;
      word-break: break-word;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .hud-box {
      background: #12141a;
      border-radius: 14px;
      padding: 14px 10px;
    }

    .hud-label {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .hud-value {
      font-size: 32px;
      font-weight: bold;
    }

    .problem-stage {
      min-height: 210px;
    }

    #sequenceArea {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #currentTerm {
      font-size: 76px;
      font-weight: bold;
      line-height: 1.1;
      margin: 8px 0;
    }

    #history {
      min-height: 32px;
      margin-top: 10px;
      font-size: 22px;
      color: #aab4c4;
      letter-spacing: 1px;
    }

    .positive { color: #72f0a4; }
    .negative { color: #ff8a8a; }

    #phaseText {
      color: #cbd5e1;
      font-size: 20px;
      margin-top: 10px;
      min-height: 28px;
    }

    .boss-stage {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
      align-items: center;
    }

    .boss-box {
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .boss-name {
      color: #ffcf66;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .boss {
      position: relative;
      width: 200px;
      height: 220px;
      transition: transform 0.15s ease;
    }

    .boss.hit {
      animation: bossHit 0.35s ease;
    }

    @keyframes bossHit {
      0% { transform: translateX(0) scale(1); filter: brightness(1); }
      20% { transform: translateX(-10px) scale(1.03); filter: brightness(1.5); }
      40% { transform: translateX(10px) scale(0.98); filter: brightness(0.7); }
      60% { transform: translateX(-8px) scale(1.02); filter: brightness(1.3); }
      100% { transform: translateX(0) scale(1); filter: brightness(1); }
    }

    .boss.dead {
      animation: bossDead 1s ease forwards;
    }

    @keyframes bossDead {
      0% { opacity: 1; transform: scale(1) rotate(0); }
      100% { opacity: 0; transform: scale(0.2) rotate(20deg) translateY(80px); }
    }

    .boss-head {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 92px;
      height: 92px;
      background: #cf4458;
      border-radius: 50%;
      border: 4px solid #ffd166;
    }

    .boss-eye {
      position: absolute;
      top: 34px;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
    }

    .boss-eye.left { left: 24px; }
    .boss-eye.right { right: 24px; }

    .boss-pupil {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 8px;
      height: 8px;
      background: #111;
      border-radius: 50%;
    }

    .boss-mouth {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 10px;
      background: #111;
      border-radius: 10px;
    }

    .boss-body {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 120px;
      background: #7c3aed;
      border-radius: 24px;
      border: 4px solid #c4b5fd;
    }

    .boss-arm {
      position: absolute;
      top: 120px;
      width: 34px;
      height: 90px;
      background: #7c3aed;
      border: 4px solid #c4b5fd;
      border-radius: 20px;
    }

    .boss-arm.left { left: 8px; transform: rotate(18deg); }
    .boss-arm.right { right: 8px; transform: rotate(-18deg); }

    .boss-leg {
      position: absolute;
      bottom: 0;
      width: 34px;
      height: 70px;
      background: #7c3aed;
      border: 4px solid #c4b5fd;
      border-radius: 20px;
    }

    .boss-leg.left { left: 56px; }
    .boss-leg.right { right: 56px; }

    .effect-text {
      min-height: 32px;
      margin-top: 10px;
      font-size: 28px;
      font-weight: bold;
    }

    .effect-hit { color: #ff7676; }
    .effect-clear { color: #72f0a4; }

    .input-box {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      flex-direction: column;
    }

    #currentInput {
      font-size: 86px;
      font-weight: bold;
      line-height: 1.1;
    }

    #judgeText {
      min-height: 36px;
      margin-top: 16px;
      font-size: 30px;
      font-weight: bold;
    }

    .judge-ok { color: #72f0a4; }
    .judge-bad { color: #ff8a8a; }

    .small-note {
      margin-top: 10px;
      color: #9aa3b2;
      font-size: 14px;
      line-height: 1.6;
    }

    pre {
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0d0f14;
      border-radius: 12px;
      padding: 14px;
      color: #98e7ff;
      font-size: 14px;
      overflow-x: auto;
      margin: 0;
    }

    @media (max-width: 760px) {
      .hud {
        grid-template-columns: repeat(2, 1fr);
      }

      .boss-stage {
        grid-template-columns: 1fr;
      }

      #currentTerm {
        font-size: 60px;
      }

      #currentInput {
        font-size: 72px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>주판 속산 보스전</h1>
    <div class="sub">
      숫자 5개를 순서대로 보고 누적 계산한 뒤,<br>
      주판으로 답을 만들고 파란 OK 버튼을 누르면 제출됩니다.
    </div>

    <div class="card">
      <div class="top-buttons">
        <button id="connectBtn">BLE 연결</button>
        <button id="disconnectBtn">연결 해제</button>
        <button id="startBtn">게임 시작</button>
        <button id="checkBtn">수동 확인</button>
      </div>
      <div id="status">대기 중</div>
      <div class="small-note">BLE 패킷 수신 = OK 제출로 처리합니다.</div>
    </div>

    <div class="card">
      <div class="hud">
        <div class="hud-box">
          <div class="hud-label">현재 문제</div>
          <div class="hud-value"><span id="problemIndex">0</span> / 20</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">남은 적 체력</div>
          <div class="hud-value" id="bossHp">20</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">현재 입력값</div>
          <div class="hud-value" id="currentInputMini">0</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">목표 상태</div>
          <div class="hud-value" id="phaseMini">대기</div>
        </div>
      </div>
    </div>

    <div class="card problem-stage">
      <div id="sequenceArea">
        <div id="currentTerm">준비</div>
        <div id="history"></div>
        <div id="phaseText">게임 시작을 누르세요</div>
      </div>
    </div>

    <div class="card boss-stage">
      <div class="boss-box">
        <div class="boss-name">암산 악당</div>
        <div id="boss" class="boss">
          <div class="boss-head">
            <div class="boss-eye left"><div class="boss-pupil"></div></div>
            <div class="boss-eye right"><div class="boss-pupil"></div></div>
            <div class="boss-mouth"></div>
          </div>
          <div class="boss-arm left"></div>
          <div class="boss-arm right"></div>
          <div class="boss-body"></div>
          <div class="boss-leg left"></div>
          <div class="boss-leg right"></div>
        </div>
        <div id="effectText" class="effect-text"></div>
      </div>

      <div class="input-box">
        <div class="hud-label">현재 입력값</div>
        <div id="currentInput">0</div>
        <div id="judgeText"></div>
        <div class="small-note">
          숫자 5개 제시가 끝난 뒤<br>
          주판으로 계산 결과를 입력하고 OK를 누르세요.
        </div>
      </div>
    </div>

    <div class="card">
      <div class="hud-label">마지막 raw 패킷</div>
      <pre id="rawBox">아직 없음</pre>
    </div>

    <div class="card">
      <div class="hud-label">디코딩 로그</div>
      <pre id="logBox">아직 없음</pre>
    </div>
  </div>

  <script>
    let device = null;
    let server = null;
    let service = null;
    let characteristic = null;
    let isListening = false;
    let lastUpdate = 0;

    const SERVICE_UUID = "674219bc-d86b-4b65-8ea4-9c3e64b857c8";
    const CHAR_UUID = "329c75cc-17ff-4de5-affd-69c80311a66f";

    const TOTAL_QUESTIONS = 20;
    const TERMS_PER_QUESTION = 5;

    let currentInput = 0;
    let currentAnswer = 0;
    let currentSequence = [];
    let currentProblem = 0;
    let bossHp = TOTAL_QUESTIONS;

    let gameStarted = false;
    let acceptingAnswer = false;
    let presenting = false;

    const statusEl = document.getElementById("status");
    const problemIndexEl = document.getElementById("problemIndex");
    const bossHpEl = document.getElementById("bossHp");
    const currentInputMiniEl = document.getElementById("currentInputMini");
    const phaseMiniEl = document.getElementById("phaseMini");

    const currentTermEl = document.getElementById("currentTerm");
    const historyEl = document.getElementById("history");
    const phaseTextEl = document.getElementById("phaseText");

    const bossEl = document.getElementById("boss");
    const effectTextEl = document.getElementById("effectText");

    const currentInputEl = document.getElementById("currentInput");
    const judgeTextEl = document.getElementById("judgeText");

    const rawBoxEl = document.getElementById("rawBox");
    const logBoxEl = document.getElementById("logBox");

    document.getElementById("connectBtn").addEventListener("click", connectBLE);
    document.getElementById("disconnectBtn").addEventListener("click", disconnectBLE);
    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("checkBtn").addEventListener("click", checkAnswer);

    window.addEventListener("pagehide", disconnectBLE);
    window.addEventListener("beforeunload", disconnectBLE);

    function updateHud() {
      problemIndexEl.textContent = currentProblem;
      bossHpEl.textContent = bossHp;
      currentInputMiniEl.textContent = currentInput;
      phaseMiniEl.textContent = presenting ? "제시 중" : (acceptingAnswer ? "입력 대기" : "대기");
      currentInputEl.textContent = currentInput;
    }

    function resetJudgeText() {
      judgeTextEl.textContent = "";
      judgeTextEl.className = "";
    }

    function clearEffects() {
      effectTextEl.textContent = "";
      effectTextEl.className = "effect-text";
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function randomSignedTerm() {
      const value = Math.floor(Math.random() * 9) + 1;
      const sign = Math.random() > 0.5 ? 1 : -1;
      return value * sign;
    }

    function generateSequence() {
      let seq = [];
      let sum = 0;

      while (seq.length < TERMS_PER_QUESTION) {
        const term = randomSignedTerm();
        const nextSum = sum + term;

        // 답을 0~99 범위로 제한
        if (nextSum >= 0 && nextSum <= 99) {
          seq.push(term);
          sum = nextSum;
        }
      }

      return { seq, sum };
    }

    async function presentSequence(sequence) {
      presenting = true;
      acceptingAnswer = false;
      updateHud();

      historyEl.textContent = "";
      currentTermEl.textContent = "3";
      phaseTextEl.textContent = "준비";
      await sleep(700);

      currentTermEl.textContent = "2";
      await sleep(700);

      currentTermEl.textContent = "1";
      await sleep(700);

      let shown = [];

      for (let i = 0; i < sequence.length; i++) {
        const value = sequence[i];
        const text = value > 0 ? `+${value}` : `${value}`;

        currentTermEl.textContent = text;
        currentTermEl.className = value > 0 ? "positive" : "negative";

        shown.push(text);
        historyEl.textContent = shown.join("   ");

        phaseTextEl.textContent = `${i + 1} / ${sequence.length} 제시 중`;
        await sleep(1000);

        currentTermEl.textContent = "";
        await sleep(250);
      }

      currentTermEl.className = "";
      currentTermEl.textContent = "?";
      phaseTextEl.textContent = "정답을 주판으로 입력하고 OK를 누르세요";
      presenting = false;
      acceptingAnswer = true;
      updateHud();
    }

    async function startGame() {
      gameStarted = true;
      currentProblem = 0;
      bossHp = TOTAL_QUESTIONS;
      currentInput = 0;
      updateHud();
      resetJudgeText();
      clearEffects();

      bossEl.classList.remove("dead");
      bossEl.style.opacity = "1";

      statusEl.textContent = "게임 시작";
      await nextProblem();
    }

    async function nextProblem() {
      if (!gameStarted) return;

      if (currentProblem >= TOTAL_QUESTIONS) {
        phaseTextEl.textContent = "모든 문제 완료!";
        currentTermEl.textContent = "CLEAR";
        historyEl.textContent = "";
        return;
      }

      currentProblem += 1;
      currentInput = 0;
      updateHud();
      resetJudgeText();
      clearEffects();

      const generated = generateSequence();
      currentSequence = generated.seq;
      currentAnswer = generated.sum;

      await presentSequence(currentSequence);
    }

    async function checkAnswer() {
      if (!acceptingAnswer) return;

      acceptingAnswer = false;
      updateHud();

      if (currentInput === currentAnswer) {
        judgeTextEl.textContent = "정답!";
        judgeTextEl.className = "judge-ok";

        effectTextEl.textContent = "💥 데미지!";
        effectTextEl.className = "effect-text effect-hit";

        bossEl.classList.remove("hit");
        void bossEl.offsetWidth;
        bossEl.classList.add("hit");

        bossHp -= 1;
        updateHud();

        currentTermEl.textContent = "정답!";
        historyEl.textContent = "";
        phaseTextEl.textContent = `${currentProblem}번 문제 성공`;

        await sleep(900);

        if (bossHp <= 0) {
          effectTextEl.textContent = "🎉 승리!";
          effectTextEl.className = "effect-text effect-clear";
          bossEl.classList.remove("hit");
          bossEl.classList.add("dead");
          currentTermEl.textContent = "WIN";
          phaseTextEl.textContent = "20문제를 모두 해결했습니다!";
          historyEl.textContent = "";
          return;
        }

        await nextProblem();
      } else {
        judgeTextEl.textContent = `오답 (${currentInput})`;
        judgeTextEl.className = "judge-bad";

        effectTextEl.textContent = "다시 계산!";
        effectTextEl.className = "effect-text";

        currentTermEl.textContent = "다시 입력";
        phaseTextEl.textContent = "주판으로 다시 계산해서 OK를 누르세요";

        acceptingAnswer = true;
        updateHud();
      }
    }

    async function cleanupConnection() {
      try {
        if (characteristic && isListening) {
          try {
            await characteristic.stopNotifications();
          } catch (e) {}
          characteristic.removeEventListener("characteristicvaluechanged", handleBLE);
          isListening = false;
        }
      } catch (e) {}

      try {
        if (device && device.gatt && device.gatt.connected) {
          device.gatt.disconnect();
        }
      } catch (e) {}

      server = null;
      service = null;
      characteristic = null;
    }

    async function disconnectBLE() {
      await cleanupConnection();
      statusEl.textContent = "연결 해제됨";
    }

    function onDisconnected() {
      statusEl.textContent = "기기 연결이 끊어졌습니다.";
      server = null;
      service = null;
      characteristic = null;
      isListening = false;
    }

    async function connectBLE() {
      try {
        statusEl.textContent = "0) 기존 연결 정리 중...";
        await cleanupConnection();

        statusEl.textContent = "1) 기기 선택창 여는 중...";

        device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: "FLEDU_" }],
          optionalServices: [SERVICE_UUID]
        });

        statusEl.textContent = "2) 선택된 기기: " + (device.name || "이름 없음");

        device.removeEventListener("gattserverdisconnected", onDisconnected);
        device.addEventListener("gattserverdisconnected", onDisconnected);

        statusEl.textContent = "3) GATT 연결 중...";
        server = await device.gatt.connect();

        statusEl.textContent = "4) 서비스 가져오는 중...";
        service = await server.getPrimaryService(SERVICE_UUID);

        statusEl.textContent = "5) 캐릭터리스틱 가져오는 중...";
        characteristic = await service.getCharacteristic(CHAR_UUID);

        statusEl.textContent = "6) Notify 시작 중...";
        await characteristic.startNotifications();

        characteristic.removeEventListener("characteristicvaluechanged", handleBLE);
        characteristic.addEventListener("characteristicvaluechanged", handleBLE);
        isListening = true;

        statusEl.textContent = "연결 성공! 숫자 입력 후 디바이스의 OK 버튼으로 제출하세요.";
      } catch (err) {
        console.error(err);
        statusEl.textContent = "BLE 연결 실패: " + err.name + " / " + err.message;
      }
    }

    function handleBLE(event) {
      const now = Date.now();
      if (now - lastUpdate < 120) return;
      lastUpdate = now;

      const data = new Uint8Array(event.target.value.buffer);
      const hex = toHexString(data);
      rawBoxEl.textContent = hex;

      const decoded = decodeAbacusPacket(data);
      currentInput = decoded.number;
      updateHud();

      logBoxEl.textContent =
        "패킷 길이: " + data.length + "\n" +
        "십의 자리 코드: " + decoded.tensHex + " → " + decoded.tens + "\n" +
        "일의 자리 코드: " + decoded.onesHex + " → " + decoded.ones + "\n" +
        "해석 숫자: " + decoded.number + "\n" +
        "마지막 바이트: " + decoded.lastByteHex;

      // 현재 디바이스 특성상 OK 누를 때 확정 패킷이 들어오므로
      // 패킷 수신 = 제출로 처리
      if (acceptingAnswer) {
        checkAnswer();
      }
    }

    function toHexString(arr) {
      return Array.from(arr)
        .map(v => v.toString(16).padStart(2, "0").toUpperCase())
        .join("-");
    }

    function mapDigit(byteValue) {
      const map = {
        0x1F: 0,
        0x17: 1,
        0x13: 2,
        0x11: 3,
        0x10: 4,
        0x0F: 5,
        0x07: 6,
        0x03: 7,
        0x01: 8,
        0x00: 9
      };
      return map[byteValue] ?? -1;
    }

    function decodeAbacusPacket(data) {
      const tensCode = data[7] ?? 0x1F;
      const onesCode = data[8] ?? 0x1F;

      const tens = mapDigit(tensCode);
      const ones = mapDigit(onesCode);
      const number = tens * 10 + ones;

      const lastByte = data[data.length - 1] ?? 0x00;

      return {
        tens,
        ones,
        number,
        tensHex: "0x" + tensCode.toString(16).toUpperCase().padStart(2, "0"),
        onesHex: "0x" + onesCode.toString(16).toUpperCase().padStart(2, "0"),
        lastByteHex: "0x" + lastByte.toString(16).toUpperCase().padStart(2, "0")
      };
    }

    updateHud();
  </script>
</body>
</html>
